# Dev environment overrides for backend
replicaCount: 1

image:
  repository: ghcr.io/rensights/app-backend
  # tag is set by CI/CD via --set image.tag=${IMAGE_TAG}
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

# All app config (DB, JWT, Stripe, Microsoft, Google) comes from the single
# Portainer-managed `dev-shared-config` secret (see chart default secrets.sharedConfig).

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

networkPolicy:
  enabled: true
  allowIngress: true
  allowTraefikIngress: true # rensights.com /api via Traefik (kube-system), not only Kong

ingress:
  enabled: true
  className: "kong"
  hosts:
    - host: dev-api.72.62.40.154.nip.io
      paths:
        - path: /
          pathType: Prefix
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/protocols: "http"
    konghq.com/connect-timeout: "60000"
    konghq.com/send-timeout: "60000"
    konghq.com/read-timeout: "60000"
    konghq.com/retries: "5"
    konghq.com/preserve-host: "false"
    konghq.com/upstream-keepalive-requests: "1000"
    konghq.com/upstream-keepalive-timeout: "60"

# Nearly all config comes from the single Portainer-managed `dev-shared-config` secret
# (SPRING_PROFILES_ACTIVE, BACKEND_EMAIL_*, BACKEND_MICROSOFT_FROM_EMAIL, APP_FRONTEND_URL,
# plus the DB/JWT/Stripe/Microsoft/Google secrets). SERVER_PORT is derived from service.port
# and REPORTS_STORAGE_PATH from reports.storage.path (structural, chart-owned).
# CORS_ORIGINS stays here because the Kong CORS plugin (00-kongplugin-cors.yaml) needs it at
# Helm render time — a secret value (read only at pod runtime) can't feed a rendered manifest.
extraEnv:
  CORS_ORIGINS: "http://dev.72.62.40.154.nip.io:31416,http://dev.72.62.40.154.nip.io,http://dev-admin.72.62.40.154.nip.io:31416,http://dev-admin.72.62.40.154.nip.io,http://localhost:3000,http://localhost:3001"

reports:
  storage:
    path: /data/reports
    existingClaim: reports-storage
