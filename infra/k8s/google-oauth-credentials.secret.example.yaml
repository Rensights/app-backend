# Example Secret for backend GOOGLE_CLIENT_ID (must match NEXT_PUBLIC_* Web client ID in GCP).
# Apply (dev): kubectl apply -f google-oauth-credentials.secret.example.yaml
# Or use Vault KV path secret/data/dev/google-oauth-credentials (see infra/external-secrets).
---
apiVersion: v1
kind: Secret
metadata:
  name: google-oauth-credentials
  namespace: dev
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: "000000000000-REPLACE_ME.apps.googleusercontent.com"
