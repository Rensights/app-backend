# Default values for backend
replicaCount: 1

image:
  repository: ghcr.io/rensights/app-backend
  # tag is set by CI/CD via --set image.tag=${IMAGE_TAG}
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: "kong"
  annotations: {}
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"          # was 500m — agent-instrumented JVM boot was CPU-throttled
    memory: "1Gi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# SECURITY FIX: Add security contexts to prevent privilege escalation
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Set to true if app doesn't need to write to root filesystem
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1001

podAnnotations: {}

# Slow JVM boot (~90s, longer with the OTel agent) is covered by this startupProbe.
# Until it succeeds, liveness/readiness are suspended — so a slow agent boot can't get
# the pod killed mid-start or fail the rollout. Window = periodSeconds * failureThreshold = 300s.
startupProbe:
  httpGet:
    path: /actuator/health
    port: http
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 10
  failureThreshold: 5

nodeSelector: {}
affinity: {}
tolerations: []

extraEnv: {}

reports:
  storage:
    path: /data/reports
    existingClaim: ""

cors:
  # CORS origins for KongPlugin (if not set, will use extraEnv.CORS_ORIGINS)
  origins: []
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  headers:
    - Authorization
    - Content-Type
    - X-Requested-With
  exposedHeaders:
    - Authorization
    - Content-Type
    - X-Requested-With
  credentials: true
  maxAge: 3600

secrets:
  # Single secret holding ALL app config for every app. Managed in Portainer.
  # Keys: POSTGRES_*, JWT_SECRET, STRIPE_*, MICROSOFT_*, GOOGLE_CLIENT_ID, *_API_URL.
  sharedConfig: dev-shared-config

serviceAccount:
  create: true
  annotations: {}
  name: ""

networkPolicy:
  enabled: true
  databasePort: 5432
  allowIngress: false
  # Traefik runs in kube-system; required for rensights.com /api when default-deny is in namespace.
  allowTraefikIngress: false
