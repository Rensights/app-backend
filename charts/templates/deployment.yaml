apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        reloader.stakater.com/auto: "true"
        deployment.kubernetes.io/revision: "{{ .Release.Revision }}"
        kubectl.kubernetes.io/restartedAt: "{{ now | date "2006-01-02T15:04:05Z07:00" }}"
        instrumentation.opentelemetry.io/inject-java: "false"
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ if .Values.image.tag }}{{ .Values.image.tag }}{{ else }}{{ .Chart.AppVersion }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - |
              export DATABASE_URL="jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}"
              exec env -u JAVA_TOOL_OPTIONS -u _JAVA_OPTIONS -u JDK_JAVA_OPTIONS java -Xshare:off -jar app.jar
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: SPRING_PROFILES_ACTIVE
            # SERVER_PORT stays chart-derived so it always matches containerPort/probes.
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            # CORS_ORIGINS stays chart-level: the Kong CORS plugin (a Helm-rendered
            # manifest) reads it at render time, so it can't come from the secret.
            - name: CORS_ORIGINS
              value: {{ .Values.extraEnv.CORS_ORIGINS | quote }}
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_DATABASE
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_PASSWORD
            # DATABASE_URL is assembled at startup from POSTGRES_* in the container
            # command (see args above); no separate env definition needed.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: JWT_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_PUBLISHABLE_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_WEBHOOK_SECRET
            - name: STRIPE_PREMIUM_PRICE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_PREMIUM_PRICE_ID
            - name: STRIPE_PREMIUM_YEARLY_PRICE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_PREMIUM_YEARLY_PRICE_ID
            - name: MICROSOFT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: MICROSOFT_TENANT_ID
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: MICROSOFT_CLIENT_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: EMAIL_ENABLED
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: BACKEND_EMAIL_ENABLED
            - name: EMAIL_USE_GRAPH_API
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: BACKEND_EMAIL_USE_GRAPH_API
            - name: MICROSOFT_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: BACKEND_MICROSOFT_FROM_EMAIL
            - name: APP_FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: APP_FRONTEND_URL
            # REPORTS_STORAGE_PATH env comes from the secret. NOTE: the PVC mount path
            # (reports.storage.path) is set at render time and must be kept equal to it.
            - name: REPORTS_STORAGE_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: REPORTS_STORAGE_PATH
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: reports-storage
              mountPath: {{ .Values.reports.storage.path | quote }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: reports-storage
          {{- if .Values.reports.storage.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.reports.storage.existingClaim | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
