name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DEV_NAMESPACE: dev

jobs:
  # Step 1: Test
  test:
    name: 1️⃣ Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone for faster checkout

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CONTAINER_TOKEN }}

      - name: Download Avro Schemas (cached)
        id: avro-schemas
        uses: actions/cache@v4
        with:
          path: schemas/avro
          key: avro-schemas-${{ hashFiles('**/.github/workflows/ci-cd.yml') }}
          restore-keys: |
            avro-schemas-
        continue-on-error: true

      - name: Download Avro Schemas
        if: steps.avro-schemas.outputs.cache-hit != 'true'
        run: |
          echo "📥 Downloading Avro schemas from avro-schemas image..."
          mkdir -p schemas/avro
          
          docker pull ghcr.io/rensights/avro-schemas:latest || {
            echo "⚠️  Warning: Could not pull avro-schemas:latest"
            echo "SKIP_AVRO=true" >> $GITHUB_ENV
            exit 0
          }
          
          docker create --name temp-schemas ghcr.io/rensights/avro-schemas:latest
          docker cp temp-schemas:/schemas/schemas/. schemas/avro/ || {
            echo "⚠️  Warning: Could not extract schemas from image"
            echo "SKIP_AVRO=true" >> $GITHUB_ENV
            docker rm temp-schemas
            exit 0
          }
          docker rm temp-schemas
          
          if [ -n "$(ls -A schemas/avro/*.avsc 2>/dev/null)" ]; then
            echo "✅ Avro schemas downloaded successfully"
            echo "SKIP_AVRO=false" >> $GITHUB_ENV
          else
            echo "⚠️  No .avsc files found - skipping Avro generation"
            echo "SKIP_AVRO=true" >> $GITHUB_ENV
          fi

      - name: Build backend
        working-directory: src
        run: |
          SKIP_AVRO_VALUE="${SKIP_AVRO:-false}"
          echo "Building with skip.avro=${SKIP_AVRO_VALUE}"
          mvn clean package -DskipTests -Dskip.avro=${SKIP_AVRO_VALUE}

      - name: Run tests
        working-directory: src
        run: mvn test

  # Step 2: Build Docker Image
  build:
    name: 2️⃣ Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.test.result == 'success'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Set image tag (pipeline number)
        id: image-tag
        run: |
          RUN_NUMBER="${{ github.run_number }}"
          echo "tag=${RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CONTAINER_TOKEN }}

      - name: Set image repository (lowercase)
        id: image-repo
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image-repo.outputs.repo_owner }}/${{ steps.image-repo.outputs.repo_name }}
          tags: |
            type=raw,value=${{ steps.image-tag.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ steps.image-repo.outputs.repo_owner }}/${{ steps.image-repo.outputs.repo_name }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ steps.image-repo.outputs.repo_owner }}/${{ steps.image-repo.outputs.repo_name }}:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            AVRO_SCHEMAS_VERSION=latest

      - name: Output image info
        run: |
          echo "✅ Image pushed:"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/   /'

  # Step 3: Deploy to Dev
  deploy-dev:
    name: 3️⃣ Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && needs.build.result == 'success'
    timeout-minutes: 15
    environment: dev
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Set image repository (lowercase)
        id: image-repo
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Set up SSH with Passphrase
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          SSH_KEY_PATH="$HOME/.ssh/id_ed25519"
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          sudo apt-get update -qq && sudo apt-get install -y -qq expect || true
          cat > /tmp/ssh-add.exp << 'EXPECT_SCRIPT'
          #!/usr/bin/expect -f
          set timeout 30
          spawn ssh-add "$env(HOME)/.ssh/id_ed25519"
          expect {
            "Enter passphrase" { send "$env(SSH_PASSPHRASE)\r"; exp_continue }
            "Identity added" { expect eof }
            timeout { exit 1 }
          }
          EXPECT_SCRIPT
          chmod +x /tmp/ssh-add.exp
          export SSH_PASSPHRASE="${{ secrets.SSH_PASSPHRASE }}"
          /tmp/ssh-add.exp
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@72.62.40.154 "echo 'SSH connection successful'" || exit 1

      - name: Setup SSH Tunnel to Kubernetes API
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -f -N -L 6443:127.0.0.1:6443 root@72.62.40.154
          sleep 2

      - name: Configure kubectl
        run: |
          echo "${{ secrets.DEV_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          sed -i 's|server: https://.*:6443|server: https://127.0.0.1:6443|g' /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl cluster-info

      # Requires GitHub secret VAULT_ESO_TOKEN (Vault token with read on KV paths below).
      # Optional repo variable VAULT_INTERNAL_ADDR, e.g. http://vault.platform.svc.cluster.local:8200
      - name: Vault + External Secrets Operator (dev)
        env:
          VAULT_ESO_TOKEN: ${{ secrets.VAULT_ESO_TOKEN }}
          VAULT_INTERNAL_ADDR: ${{ vars.VAULT_INTERNAL_ADDR }}
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          if [ -z "${VAULT_ESO_TOKEN}" ]; then
            echo "VAULT_ESO_TOKEN not set — skipping SecretStore / ExternalSecrets (use static secret steps below)."
            exit 0
          fi
          VAULT_SRV="${VAULT_INTERNAL_ADDR:-http://vault.vault.svc.cluster.local:8200}"
          kubectl create secret generic vault-eso-token -n ${DEV_NAMESPACE} \
            --from-literal=token="${VAULT_ESO_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
          sed "s|VAULT_SERVER_PLACEHOLDER|${VAULT_SRV}|g" infra/external-secrets/dev/secretstore-vault-dev.yaml | kubectl apply -f -
          kubectl apply -f infra/external-secrets/dev/externalsecrets.yaml
          kubectl wait --for=condition=Ready "secretstore/vault-dev" -n "${DEV_NAMESPACE}" --timeout=120s || true

      - name: Ensure reports PVC exists (dev)
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: reports-storage
            namespace: dev
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
            storageClassName: local-path
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CONTAINER_TOKEN }}

      - name: Verify image exists
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          IMAGE="${REGISTRY}/${{ steps.image-repo.outputs.repo_owner }}/${{ steps.image-repo.outputs.repo_name }}:${IMAGE_TAG}"
          echo "🔍 Verifying image exists: ${IMAGE}"
          docker manifest inspect ${IMAGE} >/dev/null 2>&1 || {
            echo "⚠️  Image ${IMAGE} not immediately available, checking latest..."
            docker manifest inspect ${REGISTRY}/${{ steps.image-repo.outputs.repo_owner }}/${{ steps.image-repo.outputs.repo_name }}:latest >/dev/null 2>&1 || {
              echo "❌ Image not found!"
              exit 1
            }
          }
          echo "✅ Image verified"

      - name: Configure image pull secrets for GHCR
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.CONTAINER_TOKEN }} \
            --namespace ${DEV_NAMESPACE} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Setup microsoft-graph-credentials secret for dev
        env:
          VAULT_ESO_TOKEN: ${{ secrets.VAULT_ESO_TOKEN }}
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          if [ -n "${VAULT_ESO_TOKEN}" ]; then
            echo "Skipping static microsoft-graph-credentials (synced from Vault via ExternalSecrets)."
            exit 0
          fi
          kubectl create secret generic microsoft-graph-credentials \
            --from-literal=tenant-id='e84f3a33-9e68-4a68-aae3-bebba66459e6' \
            --from-literal=client-id='70a6e6ef-c980-47dc-89ea-70ebd47fd56d' \
            --from-literal=client-secret='${{ secrets.MICROSOFT_CLIENT_SECRET }}' \
            --namespace ${DEV_NAMESPACE} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync stripe price IDs into secret for dev
        env:
          VAULT_ESO_TOKEN: ${{ secrets.VAULT_ESO_TOKEN }}
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          if [ -n "${VAULT_ESO_TOKEN}" ]; then
            echo "Skipping stripe-secrets patch (full secret managed in Vault / ExternalSecret)."
            exit 0
          fi
          STRIPE_PREMIUM_PRICE_ID=$(grep -E '^[[:space:]]*STRIPE_PREMIUM_PRICE_ID:' env-values/dev/backend.yaml | head -n 1 | sed -E 's/^[^:]+:[[:space:]]*"?([^"]*)"?/\1/')
          STRIPE_PREMIUM_YEARLY_PRICE_ID=$(grep -E '^[[:space:]]*STRIPE_PREMIUM_YEARLY_PRICE_ID:' env-values/dev/backend.yaml | head -n 1 | sed -E 's/^[^:]+:[[:space:]]*"?([^"]*)"?/\1/' || true)
          echo "Updating stripe-secrets price keys in ${DEV_NAMESPACE}"
          kubectl get secret stripe-secrets -n ${DEV_NAMESPACE} >/dev/null
          kubectl patch secret stripe-secrets -n ${DEV_NAMESPACE} --type merge -p "{\"stringData\":{\"stripe-premium-price-id\":\"${STRIPE_PREMIUM_PRICE_ID}\",\"stripe-premium-yearly-price-id\":\"${STRIPE_PREMIUM_YEARLY_PRICE_ID}\"}}"

      - name: Deploy backend to dev
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          
          # Check for stuck Helm releases
          if helm list -n ${DEV_NAMESPACE} -q | grep -q "^backend$"; then
            STATUS=$(helm status backend -n ${DEV_NAMESPACE} -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "unknown")
            if [[ "$STATUS" =~ ^(pending-install|pending-upgrade|pending-rollback|failed)$ ]]; then
              echo "⚠️  Cleaning up stuck release (status: $STATUS)..."
              helm rollback backend -n ${DEV_NAMESPACE} 2>&1 || true
              sleep 3
              helm delete backend -n ${DEV_NAMESPACE} 2>&1 || true
              sleep 3
            fi
          fi
          
          # KongPlugin created outside Helm (e.g. kubectl apply) blocks upgrade — remove so the chart can own it
          kubectl delete kongplugins.configuration.konghq.com backend-cors -n ${DEV_NAMESPACE} --ignore-not-found --wait=true
          
          echo "🚀 Deploying to DEV with tag: ${IMAGE_TAG}"
          
          # Rollout is triggered by chart pod annotation kubectl.kubernetes.io/restartedAt (now) each upgrade
          EXPECTED_REPO="${REGISTRY}/${{ steps.image-repo.outputs.repo_owner }}/${{ steps.image-repo.outputs.repo_name }}"
          
          helm upgrade --install backend ./charts \
            --namespace ${DEV_NAMESPACE} \
            --create-namespace \
            -f env-values/dev/global.yaml \
            -f env-values/dev/backend.yaml \
            --set reports.storage.path=/data/reports \
            --set reports.storage.existingClaim=reports-storage \
            --set image.tag=${IMAGE_TAG} \
            --set image.pullPolicy=Always \
            --set image.repository=${EXPECTED_REPO} \
            --set imagePullSecrets[0].name=ghcr-secret \
            --rollback-on-failure --timeout=8m || {
            
            echo "⚠️  Deployment failed or timed out, checking status..."
            kubectl get pods -n ${DEV_NAMESPACE} -l app.kubernetes.io/name=backend -o wide
            POD_PHASE=$(kubectl get pod -n ${DEV_NAMESPACE} -l app.kubernetes.io/name=backend -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "")
            if [ "$POD_PHASE" = "Running" ]; then
              echo "✅ Pod is running, deployment succeeded"
              exit 0
            fi
            exit 1
          }
          
          # Verify Helm set the values correctly
          echo "🔍 Verifying Helm release values..."
          HELM_IMAGE_TAG=$(helm get values backend -n ${DEV_NAMESPACE} -o json 2>/dev/null | jq -r '.image.tag // empty' 2>/dev/null || echo "")
          if [ "${HELM_IMAGE_TAG}" != "${IMAGE_TAG}" ]; then
            echo "⚠️  Warning: Helm values show tag '${HELM_IMAGE_TAG}' but expected '${IMAGE_TAG}'"
            echo "🔧 Re-running Helm upgrade with explicit tag..."
            helm upgrade backend ./charts \
              --namespace ${DEV_NAMESPACE} \
              -f env-values/dev/global.yaml \
              -f env-values/dev/backend.yaml \
              --set reports.storage.path=/data/reports \
              --set reports.storage.existingClaim=reports-storage \
              --set image.tag=${IMAGE_TAG} \
              --set image.pullPolicy=Always \
              --set image.repository=${EXPECTED_REPO} \
              --set imagePullSecrets[0].name=ghcr-secret
          fi

      - name: Verify deployment
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          echo "✅ Dev Deployment Status:"
          kubectl get pods -n ${DEV_NAMESPACE} -l app.kubernetes.io/name=backend
          kubectl get svc -n ${DEV_NAMESPACE} -l app.kubernetes.io/name=backend
          
          echo ""
          echo "🔍 Verifying deployed image tag..."
          DEPLOYED_IMAGE=$(kubectl get deployment backend -n ${DEV_NAMESPACE} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          echo "Deployed image: ${DEPLOYED_IMAGE}"
          echo "Expected tag: ${IMAGE_TAG}"
          
          EXPECTED_IMAGE="${REGISTRY}/${{ steps.image-repo.outputs.repo_owner }}/${{ steps.image-repo.outputs.repo_name }}:${IMAGE_TAG}"
          
          if echo "${DEPLOYED_IMAGE}" | grep -q ":${IMAGE_TAG}$"; then
            echo "✅ Image tag matches!"
          else
            echo "⚠️  Warning: Image tag mismatch!"
            echo "   Current: ${DEPLOYED_IMAGE}"
            echo "   Expected: ${EXPECTED_IMAGE}"
            echo "🔧 Patching deployment with correct image..."
            kubectl set image deployment/backend -n ${DEV_NAMESPACE} backend=${EXPECTED_IMAGE} || {
              echo "Failed to set image, trying kubectl patch..."
              kubectl patch deployment backend -n ${DEV_NAMESPACE} -p '{"spec":{"template":{"spec":{"containers":[{"name":"backend","image":"'${EXPECTED_IMAGE}'"}]}}}}'
            }
            echo "🔄 Waiting for rollout to complete..."
            kubectl rollout status deployment backend -n ${DEV_NAMESPACE} --timeout=5m
            echo "✅ Deployment updated!"
          fi
          
          echo ""
          echo "📋 Final pod details:"
          kubectl get pods -n ${DEV_NAMESPACE} -l app.kubernetes.io/name=backend -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[0].image}{"\t"}{.status.phase}{"\n"}{end}'
          
          echo ""
          echo "🔍 Verifying deployed Stripe premium price ID source..."
          DEPLOYED_STRIPE_PRICE=$(kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq -r '.spec.template.spec.containers[0].env[] | select(.name=="STRIPE_PREMIUM_PRICE_ID") | .valueFrom.secretKeyRef.key // empty')
          if [ "${DEPLOYED_STRIPE_PRICE}" != "stripe-premium-price-id" ]; then
            echo "⚠️ Deployment is not sourcing STRIPE_PREMIUM_PRICE_ID from stripe-secrets"
            echo "Actual env entry before fix:"
            kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq '.spec.template.spec.containers[0].env[] | select(.name=="STRIPE_PREMIUM_PRICE_ID")'
            PREMIUM_INDEX=$(kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq -r '.spec.template.spec.containers[0].env | to_entries[] | select(.value.name=="STRIPE_PREMIUM_PRICE_ID") | .key' | head -n 1)
            ENTERPRISE_INDEX=$(kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq -r '.spec.template.spec.containers[0].env | to_entries[] | select(.value.name=="STRIPE_ENTERPRISE_PRICE_ID") | .key' | head -n 1)
            PREMIUM_YEARLY_INDEX=$(kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq -r '.spec.template.spec.containers[0].env | to_entries[] | select(.value.name=="STRIPE_PREMIUM_YEARLY_PRICE_ID") | .key' | head -n 1)
            ENTERPRISE_YEARLY_INDEX=$(kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq -r '.spec.template.spec.containers[0].env | to_entries[] | select(.value.name=="STRIPE_ENTERPRISE_YEARLY_PRICE_ID") | .key' | head -n 1)
            JSON_PATCH='[]'
            for IDX in $(printf '%s\n' "${PREMIUM_INDEX}" "${ENTERPRISE_INDEX}" "${PREMIUM_YEARLY_INDEX}" "${ENTERPRISE_YEARLY_INDEX}" | awk 'NF' | sort -rn); do
              JSON_PATCH=$(printf '%s' "${JSON_PATCH}" | jq --argjson idx "${IDX}" '. + [{"op":"remove","path":("/spec/template/spec/containers/0/env/" + ($idx|tostring))}]')
            done
            JSON_PATCH=$(printf '%s' "${JSON_PATCH}" | jq '. + [
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"STRIPE_PREMIUM_PRICE_ID","valueFrom":{"secretKeyRef":{"name":"stripe-secrets","key":"stripe-premium-price-id"}}}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"STRIPE_PREMIUM_YEARLY_PRICE_ID","valueFrom":{"secretKeyRef":{"name":"stripe-secrets","key":"stripe-premium-yearly-price-id"}}}}
            ]')
            kubectl patch deployment backend -n ${DEV_NAMESPACE} --type json -p "${JSON_PATCH}"
            kubectl rollout status deployment backend -n ${DEV_NAMESPACE} --timeout=5m
            DEPLOYED_STRIPE_PRICE=$(kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq -r '.spec.template.spec.containers[0].env[] | select(.name=="STRIPE_PREMIUM_PRICE_ID") | .valueFrom.secretKeyRef.key // empty')
            if [ "${DEPLOYED_STRIPE_PRICE}" != "stripe-premium-price-id" ]; then
              echo "❌ Deployment is still not sourcing STRIPE_PREMIUM_PRICE_ID from stripe-secrets"
              echo "Actual env entry after fix:"
              kubectl get deployment backend -n ${DEV_NAMESPACE} -o json | jq '.spec.template.spec.containers[0].env[] | select(.name=="STRIPE_PREMIUM_PRICE_ID")'
              exit 1
            fi
          fi

