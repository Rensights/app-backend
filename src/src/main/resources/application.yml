spring:
  application:
    name: rensights-backend
  
  # Database Configuration (Single database for all entities)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/admin_db_dev}
    username: ${DATABASE_USER:admin}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA Configuration - using custom datasources
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update  # TEMPORARY: Will create missing tables. Change back to 'validate' after migration
    # SECURITY FIX: Disable SQL logging in production (prevents sensitive data exposure)
    show-sql: false
    open-in-view: false

  # SECURITY: Request size limits to prevent DoS attacks
  servlet:
    multipart:
      # SECURITY: File upload size limits
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  # SECURITY: Request size limits to prevent DoS attacks
  max-http-header-size: 8KB
  # Compress large JSON responses (e.g. public articles list) over the wire.
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-minimum-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}
  # SECURITY: Cookie configuration for HttpOnly cookie-based authentication
  cookie:
    max-age: ${JWT_COOKIE_MAX_AGE:86400} # 24 hours in seconds
    secure: ${JWT_COOKIE_SECURE:false} # false for dev (HTTP), true for prod (HTTPS)
    same-site: ${JWT_COOKIE_SAME_SITE:lax} # lax for dev (allows cross-site), strict for prod
    path: ${JWT_COOKIE_PATH:/} # Cookie path
    domain: ${JWT_COOKIE_DOMAIN:} # Empty = current domain (allows different ports in dev)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized  # SECURITY FIX: Don't expose health details publicly
  health:
    mail:
      enabled: false

# External API Configuration
deals:
  api:
    url: ${DEALS_API_URL:http://10.42.0.1:8000/deals}

analysis:
  api:
    url: ${ANALYSIS_API_URL:http://10.42.0.1:8000}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
  premium-price-id: ${STRIPE_PREMIUM_PRICE_ID:}
  premium-yearly-price-id: ${STRIPE_PREMIUM_YEARLY_PRICE_ID:}
  enterprise-price-id: ${STRIPE_ENTERPRISE_PRICE_ID:}
  enterprise-yearly-price-id: ${STRIPE_ENTERPRISE_YEARLY_PRICE_ID:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

logging:
  level:
    root: INFO
    com.rensights: DEBUG
    # SECURITY FIX: Disable SQL logging to prevent sensitive data exposure
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

resilience4j:
  circuitbreaker:
    instances:
      stripe:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      microsoft-graph:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      stripe:
        timeout-duration: 10s
      microsoft-graph:
        timeout-duration: 15s
